<div class="workout-item">
  <h2 class="exercise-name">{{ exerciseName }}</h2>
  <p class="muscle-groups" *ngIf="muscleGroups.length > 0">{{ muscleGroups.join(', ') }}</p>

  <div class="rest-timer">
    <div class="timer-row">
      <span class="timer-label">Rest</span>
      <input
        type="number"
        [(ngModel)]="restDuration"
        min="1"
        max="600"
        class="timer-duration-input"
        [disabled]="isRunning()"
      />
      <span class="timer-unit">sec</span>
      <span class="timer-countdown" [class.active]="isRunning()">
        {{ isRunning() ? formatTime(timeLeft()) : '—' }}
      </span>
    </div>
    <div class="timer-controls">
      <button class="timer-btn" (click)="adjustTime(-10)">-10s</button>
      <button class="timer-btn" (click)="adjustTime(10)">+10s</button>
      <button class="timer-btn" (click)="stopTimer()" [disabled]="!isRunning()">Stop</button>
      <button class="timer-btn" (click)="resetTimer()" [disabled]="!isRunning()">Reset</button>
    </div>
  </div>

  <textarea
    class="comment"
    [(ngModel)]="comment"
    placeholder="Add a comment about this exercise..."
    rows="2"
  ></textarea>

  <div class="sets-list">
    <div class="set-header">
      <span>Reps</span>
      <span>Weight (kg)</span>
      <span>Done</span>
      <span>Intensity</span>
      <span></span>
    </div>

    <div class="set-row"
         [class.completed]="set.completed"
         [class.intensity-green]="set.intensity !== null && set.intensity >= 7 && set.intensity <= 8"
         [class.intensity-yellow]="set.intensity === 9"
         [class.intensity-red]="set.intensity === 10"
         *ngFor="let set of sets; let i = index">
      <input
        type="number"
        [(ngModel)]="set.reps"
        min="0"
        placeholder="Reps"
      />
      <input
        type="number"
        [(ngModel)]="set.weight"
        min="0"
        step="0.5"
        placeholder="Weight"
      />
      <input
        type="checkbox"
        [(ngModel)]="set.completed"
        class="completed-checkbox"
        (change)="onSetCompleted(set)"
      />
      <input
        type="number"
        [(ngModel)]="set.intensity"
        min="1"
        max="10"
        placeholder="1-10"
        (change)="clampIntensity(set)"
        class="intensity-input"
      />
      <button class="delete-btn" (click)="deleteSet(i)" title="Delete set">
        🗑
      </button>
    </div>
  </div>

  <button class="add-set-btn" (click)="addSet()">+ Add Set</button>
</div>
