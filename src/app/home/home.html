<div class="landing">
  <h1 class="title">Workout Tracker</h1>
  <div class="btn-group">
    <button class="btn btn-primary" (click)="openSignIn()">Sign In</button>
    <button class="btn btn-secondary" (click)="goToRegister()">Register</button>
  </div>
</div>

@if (showSignIn) {
  <div class="overlay" (click)="closeSignIn()">
    <div class="modal" (click)="$event.stopPropagation()">
      <h2 class="modal-title">Sign In</h2>
      <div class="form-group">
        <input
          type="text"
          class="form-input"
          placeholder="Username"
          [(ngModel)]="username"
        />
      </div>
      <div class="form-group">
        <input
          type="password"
          class="form-input"
          placeholder="Password"
          [(ngModel)]="password"
        />
      </div>
      <button class="btn btn-primary btn-full" (click)="signIn()">Sign In</button>
    </div>
  </div>
}
